version: '3.8'

services:
  # 1. Database
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: catchpro

  # 2. Cache & Distributed Lock
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  # 3. Message Queue (Kafka) - 크래프트(KRaft) 모드 기준 (주키퍼 없는 가벼운 설정)
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

  # 4. Prometheus (스프링이 내뱉는 메트릭을 주기적으로 긁어서 저장하는 DB 역할)
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  # 5. Grafana (프로메테우스의 데이터를 예쁜 대시보드 시각화 화면으로 보여주는 툴)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    links:
      - prometheus